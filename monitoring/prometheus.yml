global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # n8n metrics
  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'

  # PostgreSQL metrics (usando postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis metrics (usando redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Kapso application metrics (si implementa /metrics endpoint)
  - job_name: 'kapso'
    static_configs:
      - targets: ['kapso-app:8000']
    metrics_path: '/metrics'
    scrape_interval: 60s

  # Node exporter para métricas del sistema
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Custom webhook metrics
  - job_name: 'webhook-metrics'
    static_configs:
      - targets: ['n8n:5678']
    metrics_path: '/webhook-metrics'
    scrape_interval: 60s